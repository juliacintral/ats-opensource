name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ats
          POSTGRES_PASSWORD: ats
          POSTGRES_DB: ats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Setup backend env
        run: |
          cat > apps/backend/.env << 'EOF'
          DATABASE_URL=postgresql://ats:ats@localhost:5432/ats_test
          JWT_SECRET=e2e-secret-test
          JWT_EXPIRES_IN=1h
          REFRESH_TOKEN_SECRET=e2e-refresh-test
          REFRESH_TOKEN_EXPIRES_IN=7d
          REDIS_URL=redis://localhost:6379
          AI_PROVIDER=mock
          PORT=3001
          EOF

      - name: Migrate & seed DB
        working-directory: apps/backend
        run: |
          npx prisma migrate deploy
          npx ts-node prisma/seed.ts
        env:
          DATABASE_URL: postgresql://ats:ats@localhost:5432/ats_test

      - name: Start backend
        working-directory: apps/backend
        run: npm run start:prod &
        env:
          DATABASE_URL: postgresql://ats:ats@localhost:5432/ats_test

      - name: Wait for backend
        run: npx wait-on http://localhost:3001/api/health --timeout 30000

      - name: Setup frontend env
        run: |
          cat > apps/frontend/.env.local << 'EOF'
          NEXT_PUBLIC_API_URL=http://localhost:3001/api
          EOF

      - name: Build & start frontend
        working-directory: apps/frontend
        run: |
          npm run build
          npm run start &

      - name: Wait for frontend
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/frontend
        run: npx playwright test
        env:
          E2E_BASE_URL: http://localhost:3000
          SEED_EMAIL: admin@ats.local
          SEED_PASSWORD: Admin@12345

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7
